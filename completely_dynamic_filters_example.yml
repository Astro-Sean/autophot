# AutoPHOT Configuration for Completely Dynamic Filter System
# This demonstrates the ultimate flexibility: ANY filter name is supported

# Basic settings
global_verbose_level: 1
outdir_name: REDUCED
wdir: .
restart: True
target_name: SN_2025aico_dynamic
target_ra: 172.318125
target_dec: 20.585611

# Filter selection - no restrictions, accept any discovered filter
select_filter: False
selected_filters: []  # Empty means process ALL discovered filters

# COMPLETELY DYNAMIC CATALOG CONFIGURATION
catalog:
  # Option 1: Pure custom catalog approach (most flexible)
  use_catalog: "custom"
  catalog_custom_fpath: "my_arbitrary_filters.csv"
  
  # Option 2: Gaia custom catalog with arbitrary transmission curves
  # Uncomment this section and comment out the above for Gaia-based approach
  # use_catalog: "gaia_custom"
  # transmission_curve_map:
  #   # ANY filter name can be used here - no restrictions!
  #   my_custom_filter: "transmission_curves/custom1.dat"
  #   NIR_band: "transmission_curves/nir.dat"
  #   special_survey: "transmission_curves/survey.dat"
  #   weird_filter: "transmission_curves/weird.dat"
  #   Y: "transmission_curves/Y_band.dat"
  #   w: "transmission_curves/w_band.dat"
  #   # Add as many as you need!
  
  # Option 3: Mixed approach - standard catalogs + custom filters
  # use_catalog:
  #   "standard": "pan_starrs"  # For g, r, i, z
  #   "extended": "custom"     # For your arbitrary filters
  #   "default": "gaia"
  
  catalog_radius: 0.25
  gaia_xp_radius_deg: 0.1667
  gaia_xp_max_sources: 5000
  
  # Gaia custom catalog settings (if using transmission curves)
  gaia_curve_map_max_sources: 100
  gaia_curve_map_order_by: distance

# Example custom catalog format (my_arbitrary_filters.csv)
# This can contain ANY filter names you want!
# ------------------------------------------------------
# ra,dec,my_custom_filter,my_custom_filter_err,NIR_band,NIR_band_err,special_survey,special_survey_err
# 172.318,20.585,18.5,0.02,17.2,0.01,19.8,0.03
# 172.320,20.587,19.1,0.02,17.8,0.01,20.2,0.04
# 172.315,20.583,18.9,0.02,17.5,0.01,19.5,0.03
# ------------------------------------------------------
# 
# Rules for custom catalogs:
# 1. Filter names can be ANY string (no restrictions!)
# 2. Optional: include _err columns for uncertainties
# 3. AutoPHOT will automatically discover photometric columns
# 4. Non-photometric columns (ra, dec, name, id) are ignored

# Template subtraction settings
template_subtraction:
  prepare_templates: False
  use_templates: True

# WCS settings
wcs:
  solve_field: True
  scamp_refine: True
  TNS_BOT_ID: null
  TNS_BOT_NAME: null
  TNS_BOT_API: null

# Photometry settings
photometry:
  aperture_n_jobs: 1
  method: "aperture"

# Plotting settings
plot:
  save_plots: True
  plot_format: "png"

# TELESCOPE CONFIGURATION FOR ARBITRARY FILTERS
# ------------------------------------------------------
# Create telescope.yml in your working directory:
#
# MyObservatory:
#   default:
#     MyInstrument:
#       filter_key_0: FILTER
#       # Map your FITS filter names to your catalog filter names
#       # ANY names are allowed on both sides!
#       CUSTOM1: my_custom_filter
#       NIR: NIR_band
#       SURVEY: special_survey
#       Y: Y
#       w: w
#       # Add as many mappings as you need!
# ------------------------------------------------------

# TRANSMISSION CURVE FILES (for Gaia custom catalog)
# ------------------------------------------------------
# Create transmission curve files with format:
# wavelength_nm  throughput
# 400           0.0
# 450           0.1
# 500           0.8
# 550           1.0
# 600           0.9
# 650           0.3
# 700           0.0
#
# Files can be named anything and referenced in transmission_curve_map
# No restrictions on filter names or curve shapes!
# ------------------------------------------------------

# ADVANCED USAGE: SVO Filter Service Integration
# ------------------------------------------------------
# You can also use SVO filter service for standard curves:
#
# curve_map_svo:
#   Y: "Paranal/HAWKI.Y"
#   w: "LCOGT/SDSS.w"
#   my_filter: "Observatory/Instrument.my_filter"
# ------------------------------------------------------

# LOGGING AND DEBUGGING
# ------------------------------------------------------
# Set global_verbose_level: 2 to see detailed filter discovery:
# - Which filters are discovered from custom catalogs
# - Transmission curve validation results
# - Filter normalization process
# - Any issues or warnings
# ------------------------------------------------------

# BENEFITS OF THIS APPROACH:
# ------------------------------------------------------
# 1. NO FILTER RESTRICTIONS: Use any filter name you want
# 2. AUTOMATIC DISCOVERY: AutoPHOT finds filters in your catalog
# 3. FLEXIBLE INPUTS: Custom catalogs OR transmission curves
# 4. NO CODE CHANGES: No need to modify AutoPHOT source code
# 5. FUTURE-PROOF: Add new filters without touching the code
# 6. SURVEY-SPECIFIC: Perfect for specialized filter sets
# 7. BACKWARD COMPATIBLE: Still works with standard filters
# ------------------------------------------------------
