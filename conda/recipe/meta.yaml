{% set name = "autophot" %}
{% set version = "0.1.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../..

build:
  noarch: python
  number: 1
  script: pip install . legacystamps

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - wheel
    - numpy >=1.26,<2
    - pandas ==2.2.3
    - scikit-image ==0.25.0
    - matplotlib ==3.10.0
    - astroquery ==0.4.7
    - photutils ==2.0.2
    - lmfit ==1.3.2
    - emcee ==3.1.6
    - corner
  run:
    - python >=3.9
    - astroalign ==2.6.1
    - astropy ==6.1.6
    - astroquery ==0.4.7
    - astromatic-source-extractor
    - astromatic-scamp
    - astromatic-swarp
    - astroscrappy ==1.2.0
    - emcee ==3.1.6
    - lmfit ==1.3.2
    - matplotlib ==3.10.0
    - numpy >=1.26,<2
    - pandas ==2.2.3
    - photutils ==2.0.2
    - pyyaml ==6.0.2
    - reproject ==0.14.1
    - requests ==2.32.3
    - scikit-image ==0.25.0
    - scikit-learn >=1.3
    - scipy ==1.15.1

test:
  imports:
    - main
    - templates
    - utils
    - databases
  commands:
    - autophot-main -h
  requires:
    - python >=3.9
    - pandas ==2.2.3
    - scikit-image ==0.25.0
    - matplotlib ==3.10.0
    - astroquery ==0.4.7
    - photutils ==2.0.2
    - lmfit ==1.3.2
    - emcee ==3.1.6
    - corner

about:
  home: https://github.com/Astro-Sean/autophot
  dev_url: https://github.com/Astro-Sean/autophot
  doc_url: https://ui.adsabs.harvard.edu/abs/2022A&A...667A..62B
  summary: Automated photometry pipeline for transient astronomy, including calibrated aperture/PSF photometry, template subtraction, and light-curve-ready outputs for CCD/NIR imaging.
  license: MIT
  license_file: LICENSE

