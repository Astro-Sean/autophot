{% set name = "autophot-object" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../..

build:
  noarch: python
  number: 0

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
    - wheel
  run:
    - python >=3.9
    - astroalign ==2.6.1
    - astropy ==6.1.6
    - astroquery ==0.4.7
    - astroscrappy ==1.2.0
    - emcee ==3.1.6
    - lmfit ==1.3.2
    - matplotlib ==3.10.0
    - numpy >=1.26,<2
    - pandas ==2.2.3
    - photutils ==2.0.2
    - pyyaml ==6.0.2
    - reproject ==0.14.1
    - requests ==2.32.3
    - scikit-image ==0.25.0
    - scikit-learn >=1.3
    - scipy ==1.15.1

test:
  imports:
    - main
    - templates
    - utils
    - databases
  commands:
    - autophot-main -h
  requires:
    - python >=3.9

about:
  summary: AutoPHOT object photometry pipeline (CCD/NIR; calibrated photometry; template subtraction).
  license: MIT
  license_file: LICENSE

