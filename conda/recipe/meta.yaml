{% set name = "autophot" %}
{% set version = "1.0.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../..

# IMPORTANT: This package requires conda-forge channel
# Install with: conda install -c conda-forge -c astro-juanlu autophot
# Or add conda-forge to your channels: conda config --add channels conda-forge
#
# SFFT and its dependencies are now included in the recipe.

build:
  noarch: python
  # Increment when re-publishing the same package version to Anaconda (avoids 409 conflict).
  number: 2

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
    - wheel
    - numpy >=2.0
    - pandas >=3.0
    - scikit-image >=0.24
    - matplotlib >=3.10
    - astroquery >=0.4.11
    - photutils >=3.0
    - lmfit >=1.3.4
    - emcee >=3.1.6
    - corner >=2.2.3
    - ccdproc >=2.5.1
    - scipy >=1.17
    - reproject >=0.20
    - requests >=2.34
    - pyyaml >=6.0
    - astroalign >=2.6.2
    - astropy >=7.0
    - astroscrappy ==1.2.0
    - tqdm >=4.68
    - scikit-learn >=1.9
    # SFFT dependencies
    - fastremap >=1.20
    - llvmlite >=0.36
    - numba >=0.53
    - pyfftw >=0.12
    - sep >=1.0
  run:
    - python >=3.11
    - astroalign >=2.6.2
    - astropy >=7.0
    - astroquery >=0.4.11
    - astromatic-source-extractor
    - astromatic-scamp
    - astromatic-swarp
    - astroscrappy ==1.2.0
    - corner >=2.2.3
    - ccdproc >=2.5.1
    - emcee >=3.1.6
    - lmfit >=1.3.4
    - matplotlib >=3.10
    - numpy >=2.0
    - pandas >=3.0
    - photutils >=3.0
    - pyyaml >=6.0
    - reproject >=0.20
    - requests >=2.34
    - scikit-image >=0.24
    - scikit-learn >=1.9
    - scipy >=1.17
    - tqdm >=4.68
    # SFFT dependencies
    - fastremap >=1.20
    - llvmlite >=0.36
    - numba >=0.53
    - pyfftw >=0.12
    - sep >=1.0

test:
  imports:
    - main
    - templates
    - utils
    - databases
  commands:
    - autophot-main -h
  requires:
    - python >=3.11
    - pandas >=3.0
    - scikit-image >=0.24
    - matplotlib >=3.10
    - astroquery >=0.4.11
    - photutils >=3.0
    - lmfit >=1.3.4
    - emcee >=3.1.6
    - corner >=2.2.3
    - ccdproc >=2.5.1
    # SFFT dependencies
    - fastremap >=1.20
    - llvmlite >=0.36
    - numba >=0.53
    - pyfftw >=0.12
    - sep >=1.0

about:
  home: https://github.com/Astro-Sean/autophot
  dev_url: https://github.com/Astro-Sean/autophot
  doc_url: https://ui.adsabs.harvard.edu/abs/2022A&A...667A..62B
  summary: Automated photometry pipeline for transient astronomy, including calibrated aperture/PSF photometry, template subtraction, and light-curve-ready outputs for CCD/NIR imaging.
  license: MIT
  license_file: LICENSE

