{% set name = "autophot" %}
{% set version = "0.1.27" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../..

# IMPORTANT: This package requires conda-forge channel
# Install with: conda install -c conda-forge -c astro-juanlu autophot
# Or add conda-forge to your channels: conda config --add channels conda-forge

build:
  noarch: python
  # Increment when re-publishing the same package version to Anaconda (avoids 409 conflict).
  number: 2

requirements:
  host:
    - python >=3.11,<3.12
    - pip
    - setuptools
    - wheel
    - numpy ==2.4.6
    - pandas ==3.0.1
    - scikit-image ==0.25.0
    - matplotlib ==3.10.8
    - astroquery ==0.4.11
    - photutils ==3.0.0
    - lmfit ==1.3.4
    - emcee ==3.1.6
    - corner ==2.2.3
    - ccdproc ==2.5.1
    - scipy ==1.17.0
    - reproject ==0.19.0
    - requests ==2.32.5
    - pyyaml ==6.0.3
    - astroalign ==2.6.2
    - astropy ==7.2.0
    - astroscrappy ==1.2.0
    - tqdm ==4.67.3
    - scikit-learn ==1.8.0
  run:
    - python >=3.11,<3.12
    - astroalign ==2.6.2
    - astropy ==7.2.0
    - astroquery ==0.4.11
    - astromatic-source-extractor
    - astromatic-scamp
    - astromatic-swarp
    - astroscrappy ==1.2.0
    - corner ==2.2.3
    - ccdproc ==2.5.1
    - emcee ==3.1.6
    - lmfit ==1.3.4
    - matplotlib ==3.10.8
    - numpy ==2.4.6
    - pandas ==3.0.1
    - photutils ==3.0.0
    - pyyaml ==6.0.3
    - reproject ==0.19.0
    - requests ==2.32.5
    - scikit-image ==0.25.0
    - scikit-learn ==1.8.0
    - scipy ==1.17.0
    - tqdm ==4.67.3

test:
  imports:
    - main
    - templates
    - utils
    - databases
  commands:
    - autophot-main -h
  requires:
    - python >=3.11,<3.12
    - pandas ==3.0.1
    - scikit-image ==0.25.0
    - matplotlib ==3.10.8
    - astroquery ==0.4.11
    - photutils ==3.0.0
    - lmfit ==1.3.4
    - emcee ==3.1.6
    - corner ==2.2.3
    - ccdproc ==2.5.1

about:
  home: https://github.com/Astro-Sean/autophot
  dev_url: https://github.com/Astro-Sean/autophot
  doc_url: https://ui.adsabs.harvard.edu/abs/2022A&A...667A..62B
  summary: Automated photometry pipeline for transient astronomy, including calibrated aperture/PSF photometry, template subtraction, and light-curve-ready outputs for CCD/NIR imaging.
  license: MIT
  license_file: LICENSE

