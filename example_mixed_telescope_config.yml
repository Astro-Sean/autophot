# AutoPHOT Configuration Example for Mixed Telescope Data
# This configuration demonstrates how to handle science images from one telescope
# (e.g., NOT with custom filters) and templates from another (e.g., PS1)

# Basic settings
global_verbose_level: 1
outdir_name: REDUCED
wdir: .
restart: True
target_name: SN_2025aico
target_ra: 172.318125
target_dec: 20.585611

# Filter selection - process all available filters
select_filter: False
selected_filters: []

# Catalog configuration for mixed telescope data
catalog:
  # Use different catalogs for different filter sets
  # This ensures proper filter matching for both science and template images
  use_catalog:
    "BVI": "apass"       # APASS for Johnson-Cousins filters (NOT science)
    "gri": "pan_starrs"   # Pan-STARRS for SDSS filters (PS1 templates)
    "default": "gaia"     # Fallback to Gaia for any other filters
  catalog_radius: 0.25
  gaia_xp_radius_deg: 0.1667
  gaia_xp_max_sources: 5000

# Template subtraction settings
template_subtraction:
  prepare_templates: False
  use_templates: True

# WCS settings
wcs:
  solve_field: True
  scamp_refine: True
  TNS_BOT_ID: null
  TNS_BOT_NAME: null
  TNS_BOT_API: null

# Photometry settings
photometry:
  aperture_n_jobs: 1
  method: "aperture"  # or "psf"

# Limiting magnitude settings
limiting_magnitude:
  n_jobs: 1

# Aperture settings
aperture:
  method: "auto"
  
# PSF settings  
psf:
  method: "auto"

# Background subtraction
background:
  method: "auto"

# Plotting settings
plot:
  save_plots: True
  plot_format: "png"

# Notes on this configuration:
# 1. The improved normalize_photometric_filter_name() function will automatically
#    handle NOT telescope filters like b_bes -> B, r_sdss -> r, etc.
# 2. The catalog mapping ensures that Johnson-Cousins filters use APASS
#    while SDSS filters use Pan-STARRS, which is optimal for each system
# 3. Template images from PS1 (g, r, i, z) will work seamlessly with
#    science images from NOT (b_bes, v_bes, r_sdss, i_sdss, g_sdss, z_sdss)
# 4. The enhanced logging will show when filters are auto-mapped
