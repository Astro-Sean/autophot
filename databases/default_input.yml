default_input:

  fits_dir: null # str --- Directory containing FITS images (`.fits`, `.fts`, or `.fit`).

  ignore_no_telescop: False # bool --- If True, skip files missing the `TELESCOP` FITS header keyword.

  skip_file_check: False # bool --- If True, skip FITS header consistency checks (use with care).

  outdir_name: REDUCED # str --- Output directory suffix (e.g. `REDUCED`).

  select_filter: False # bool --- If True, only run on selected_filters.

  selected_filters: [] # list[str]|null --- Optional list of filters to run (e.g. `["g","r"]`). When empty/null, run all available filters.

  global_verbose_level: 1 # int --- Global verbosity: 0=warnings/errors only, 1=normal info, 2=debug (very chatty).

  target_name: Transient # str --- Target name used in outputs (e.g. IAU name).
  target_ra: null # float --- Target right ascension (degrees, FK5/J2000).
  target_dec: null # float --- Target declination (degrees, FK5/J2000).

  nCPU: 1 # int --- Number of CPU workers used for image-level parallelism (1=serial).

  restart: True # bool --- If True, reprocess all files (ignore existing outputs where applicable).

  wdir: . # str --- Working directory for scratch files and caches (catalog queries, telescope DB, intermediate products).

  rng_seed: null # int|null --- Random seed for injection/recovery experiments (`null` = non-deterministic).

  use_header_radec: False # bool|list[str]|str --- If True, try header RA/Dec keys (`CAT-RA`,`CAT-DEC`). If a 2-item list or comma-separated string, treat as `(RA_KEY, DEC_KEY)` header keys and copy those into `target_ra`/`target_dec` (degrees, FK5/J2000; units auto-detected for sexagesimal vs degrees).

  save_cutout_plot: True # bool --- Save diagnostic cutout plots where supported (e.g. star-shape checks).

  # The following are typically populated per-image from FITS headers during processing.
  # They are included here because some code paths use `.get(...)` fallbacks.
  fpath: '' # str --- Runtime: current FITS file path (set internally).
  write_dir: null # str|null --- Runtime: output directory for current image (set internally).
  imageFilter: '' # str --- Runtime: band name for current image after mapping (set internally).
  exposure_time: 30.0 # float --- Used only for workflows without a FITS header; science frames must supply EXPTIME/EXPOSURE in the header (see main + aperture.resolve_exposure_time_seconds).
  gain: 1.0 # float --- Used only for workflows without a FITS header; science frames must supply GAIN (or the telescope.yml gain keyword) in the header (see main + aperture.resolve_gain_e_per_adu).
  read_noise: 0.0 # float --- Runtime fallback read noise (e-) if header key is missing.
  pixel_scale: null # float|null --- Runtime fallback pixel scale (arcsec/pixel) if not in telescope DB/header.
  fwhm: 3.0 # float --- Runtime fallback seeing FWHM (pixels) if not measured/available.
  science_fwhm: null # float|null --- Runtime: measured science-image FWHM (pixels) (set internally).
  scale: 0 # float|int --- Runtime: plotting/cutout scale selector (set internally; pipeline-specific).
  saturate: .inf # float --- Runtime fallback saturation level (ADU) if header key is missing.

  aperture_correction: 0.0 # float --- Runtime: measured aperture correction (mag) for calibration (set internally).
  aperture_correction_err: 0.0 # float --- Runtime: aperture correction uncertainty (mag) (set internally).

  preprocessing:
    trim_image: 0 # float --- If >0, trim to a (2*trim_image) arcmin box centred on the target.

  photometry:
    aperture_size: 1.7 # float --- Aperture radius in units of FWHM (pixels = `aperture_size * fwhm`).
    enforce_nonnegative_local_background: False # bool --- If True, clamp annulus-estimated local background to >=0 before subtraction (prevents flux inflation when local sky is negative from over-subtraction/miscalibration).
    apply_aperture_correction: False # bool --- If True, apply aperture correction from PSF stars to aperture mags.
    plot_aperture_correction: False # bool --- If True, save the aperture-correction diagnostic plot (curve of growth).
    apply_colorterms: True # bool --- If True, measure and apply color term corrections to catalog sources during calibration.
    color_term_poly_order: 1 # int --- Polynomial order for color term fitting: 1 for linear, 2 for quadratic.
    color_term_n_segments: 1 # int --- Number of segments for piecewise linear fitting: 1 for single line, 2 for two segments with breakpoint, etc. Overrides poly_order if > 1.
    aperture_radius: null # float|null --- Explicit aperture radius (pixels). If null, computed from `fwhm` (typically max(1.5*FWHM, 2.0)).
    psf_oversample: 1 # int --- Oversampling factor for PSF modelling/fitting grids.
    psf_init_moffat_beta: 4.765 # float --- Moffat beta for initial ePSF kernel (4.765 ~ atmospheric-turbulence-like PSF; lower values add stronger wings).
    psf_smoothing_kernel: quartic # str --- ePSFBuilder smoothing kernel type ("quartic" recommended; "gaussian" optional).
    psf_smoothing_kernel_size: null # int|null --- Optional explicit smoothing-kernel size (pixels, on the oversampled grid). If null, auto-sized from FWHM and oversampling.
    psf_smoothing_kernel_size_scale_fwhm: 0.8 # float --- Auto kernel size scale: size ~= scale * (oversample * FWHM), clamped to psf_smoothing_kernel_size_max.
    psf_smoothing_kernel_size_max: 9 # int --- Maximum auto smoothing-kernel size (odd; oversampled grid).
    crowded_field: False # bool --- Photometry crowded-field toggle (affects source selection/cleaning heuristics where implemented).
    redo_sources: False # bool --- If True, redo source detection/photometry even if intermediate outputs exist.
    fitting_xy_bounds: 1.0 # float --- Allowed X/Y fitting offset bound in arcseconds; converted to pixels using image pixel_scale.
    lpi_background_for_target: False # bool --- (In development) If True, apply an LPI-style local background infill under the transient (structured background robustness). Paper: `https://iopscience.iop.org/article/10.3847/1538-4357/ac6875`
    lpi_inner_radius_scale_fwhm: 1.5 # float --- (In development) Hidden-region radius (pixels) = scale * FWHM for LPI-style infill (region treated as "behind the PSF core").
    lpi_outer_radius_scale_fwhm: 4.5 # float --- (In development) Good-pixel outer radius (pixels) = scale * FWHM for LPI-style infill conditioning region.
    lpi_stamp_half_size_scale_fwhm: 6.0 # float --- (In development) Stamp half-size (pixels) = scale * FWHM used for LPI-style infill.
    lpi_n_samples: 250 # int --- (In development) Number of shifted local samples for LPI-style infill regression.
    lpi_sample_window_px: 30 # int --- (In development) Random shift window (+/- pixels) for drawing local samples around the transient.
    lpi_min_shift_px: null # float|null --- (In development) Minimum shift (pixels) for LPI training samples to avoid learning/subtracting the transient itself. If null, defaults to outer_radius.
    lpi_ridge_lambda: 0.01 # float --- (In development) Ridge regularization strength for LPI-style infill regression.
    lpi_save_diagnostic_plot: True # bool --- (In development) If True and lpi_background_for_target=True, save an LPI diagnostic plot next to per-image outputs.

    # SExtractor -> pipeline FWHM / scale: constant-region mask can drop many stars on ultra-smooth sky (biased FWHM).
    sextractor_reject_constant_regions: True # bool --- If False, do not reject sources in flat-variance regions.
    # Robust median FWHM from SExtractor FWHM_IMAGE (sigma-clipping iterations).
    fwhm_sigma_clip_maxiters: 15 # int --- Higher = more stable FWHM on noisy outlier stars; slower is negligible.

    # PSF star selection: FFT-based outlier rejection (blends, cosmic rays).
    psf_min_candidates: 8 # int --- Minimum PSF candidates to preserve during quality cuts (adaptive guard against over-pruning).
    psf_saturate_fraction: 0.90 # float --- Nominal saturation cutoff for PSF stars (peak < fraction * saturate); auto-relaxed when candidate pool is small.
    psf_fft_rejection: True # bool --- Enable FFT-based rejection during PSF star selection.
    psf_fft_n_sigma: 4.0 # float --- Rejection threshold (sigma units) for FFT outlier metric.
    psf_fft_min_frac_keep: 0.25 # float --- Minimum fraction of PSF stars to retain after rejection.
    psf_fft_min_stars: 10 # int --- Minimum PSF stars required to run FFT rejection; otherwise skip.
    psf_fft_use_mad: True # bool --- Use MAD-based scale estimate for FFT rejection statistics.
    psf_fft_use_median_deviation: True # bool --- Use median absolute deviation around the median (robust).
    psf_threshold_limit: 5.0 # float --- Minimum detection threshold for PSF-star candidates (lower is less restrictive).
    psf_snr_min: 5.0 # float --- Minimum SNR for PSF-star candidates.
    psf_snr_max: 1000000.0 # float --- Maximum SNR for PSF-star candidates.
    psf_build_min_keep_frac_after_cut: 0.60 # float --- Do not apply a threshold/SNR cut if it would keep fewer than this fraction of current candidates.
    psf_preselect_factor: 1.3 # float --- Candidate preselection factor before spatial downselection (closer to 1.0 is less restrictive).
    undersampled_fwhm_threshold: 2.5 # float --- Treat FWHM <= this value (pixels) as undersampled for PSF build/fit behavior.
    psf_disable_build_quality_cuts_undersampled: True # bool --- In undersampled regime, disable strict threshold/SNR candidate cuts to avoid over-pruning.
    psf_build_sampling_boost_max: 1.6 # float --- Maximum adaptive build-window boost for normal sampling.
    psf_build_sampling_boost_max_undersampled: 2.2 # float --- Maximum adaptive build-window boost for undersampled images.
    psf_fit_boxsize_scale_fwhm: 2.5 # float --- EPSF star-fitting box size in FWHM units (larger captures more wings; too small can make PSF too narrow).
    psf_fit_box_min_arcsec: 2.5 # float --- Minimum PSF build fit-box size in arcsec (converted to pixels via pixel_scale).
    psf_cutout_size_scale_fwhm: 10.0 # float --- EPSF star-cutout size in FWHM units (controls total wing coverage in PSF build).
    psf_cutout_min_arcsec: 9.0 # float --- Minimum PSF build cutout size in arcsec (converted to pixels via pixel_scale).
    psf_norm_radius_scale_fwhm: 2.8 # float --- Minimum EPSF normalization radius in FWHM units (helps preserve PSF wings).
    psf_norm_radius_min_pixels: 5.0 # float --- Absolute lower bound for EPSF normalization radius (pixels).
    psf_build_sigma_clip_sigma: 4.0 # float --- SigmaClip threshold used while stacking stars in EPSFBuilder (higher is less restrictive and preserves wings better).
    psf_build_sigma_clip_maxiters: 15 # int --- Maximum SigmaClip iterations for EPSFBuilder stacking.
    psf_fit_shape_bright_scale_fwhm: 3.0 # float --- PSF photometry fit window scale (bright tier) in FWHM units.
    psf_fit_shape_faint_scale_fwhm: 2.5 # float --- PSF photometry fit window scale (faint tier) in FWHM units.
    psf_fit_shape_vfaint_scale_fwhm: 2.5 # float --- PSF photometry fit window scale (very-faint tier) in FWHM units.
    psf_fit_shape_bright_min_arcsec: 3.0 # float --- Minimum bright-tier fit window size in arcsec (converted to pixels via pixel_scale).
    psf_fit_shape_faint_min_arcsec: 2.5 # float --- Minimum faint-tier fit window size in arcsec (converted to pixels via pixel_scale).
    psf_fit_shape_vfaint_min_arcsec: 2.0 # float --- Minimum very-faint-tier fit window size in arcsec (converted to pixels via pixel_scale).
    psf_fit_sampling_boost_max: 1.6 # float --- Maximum adaptive boost for fit-window scales on coarse/undersampled images.
    psf_local_background_floor: 0.0 # float|null --- Floor for per-source local background used during PSF fitting (in image data units). Use null to disable flooring and allow negative local backgrounds.
    psf_target_fit_shape_boost: 1.5 # float --- Multiplier applied to all fit-window scales for target-only PSF fits to better capture wings.

    # MCMC (emcee) tuning for PSF fits.
    perform_emcee_fitting_s2n: 0 # float --- If >0, run emcee PSF/MAG fitting when source S/N is below this value.
    check_inverted_image: False # bool --- If True, also fit target on image multiplied by -1 to detect negative PSF dips (fading sources in template subtraction).
    aperture_n_jobs: 1 # int --- Worker processes for aperture photometry loops (per-image). 1 = serial; >1 can speed up large source lists.
    emcee_nwalkers: 20 # int --- Number of emcee walkers.
    emcee_nsteps: 5000 # int --- Total emcee steps (per walker).
    emcee_delta: null # float|null --- Proposal scale / step size override (implementation-specific).
    emcee_burnin_frac: 0.3 # float --- Fraction of samples to discard as burn-in.
    emcee_thin: 10 # int --- Thinning factor for saved chain samples.
    emcee_adaptive_tau_target: 50 # int --- Target integrated autocorrelation time for adaptive stopping (if enabled).
    emcee_min_autocorr_N: 100 # int --- Minimum chain length (in steps) before autocorr is estimated.
    emcee_batch_steps: 100 # int --- Steps per batch when running emcee in batches.
    emcee_jitter_scale: 0.01 # float --- Small jitter applied to initial walker positions (relative scale).
    optimum_radius_min_keep_abs: 8 # int --- Minimum number of stars to retain in optimum-radius source selection (adaptive rescue if strict filters over-prune).
    optimum_radius_min_keep_frac: 0.25 # float --- Minimum retained fraction (of prefiltered stars) in optimum-radius selection.
    optimum_radius_use_moffat_cog: False # bool --- If True, derive per-source optimum radius from analytic Moffat encircled-energy inversion instead of empirical CoG interpolation.
    optimum_radius_moffat_beta: 4.765 # float --- Moffat beta used when optimum_radius_use_moffat_cog=True (higher -> narrower wings; 4.765 ~ turbulence-like PSF).
    optimum_radius_core_radius_fwhm: 1.7 # float --- Core concentration radius (in FWHM) used to reject very broad stars.
    optimum_radius_core_flux_min: 0.50 # float --- Minimum enclosed normalized flux required within optimum_radius_core_radius_fwhm.
    optimum_radius_outer_start_fwhm: 2.2 # float --- Radius (in FWHM) beyond which tail flatness/negligibility is evaluated.
    optimum_radius_outer_std_max: 0.05 # float --- Maximum allowed standard deviation of normalized CoG flux in outer tail.
    optimum_radius_outer_slope_abs_max: 0.03 # float --- Maximum allowed absolute mean slope of normalized CoG in outer tail.

  wcs:
    solver: astrometry # str --- WCS solver backend (e.g. astrometry, scamp).
    profile: default # str --- Named WCS-solver profile/tuning preset.
    crowded_auto: True # bool --- Auto-switch to crowded-field WCS settings when heuristics trigger.
    crowded_auto_n_sources_min: 1500 # int --- Crowded-field trigger: minimum detected sources.
    crowded_auto_sources_per_arcmin2_min: 200.0 # float --- Crowded-field trigger: sources per arcmin^2 threshold.
    crowded_auto_background_rms_min: null # float|null --- Crowded-field trigger: minimum background RMS (optional).

    redo_wcs: True # bool --- If True, solve/refresh WCS even if a WCS exists in the header.
    projection_type: TPV # str --- WCS projection/distortion mode: TPV (solve-field seed + SCAMP refinement) or SIP (solve-field only).
    allow_fallback_to_existing_on_solve_fail: False # bool --- If False, require a fresh solve when redo_wcs=True (no silent fallback to original header WCS).
    apply_solved_to_fits: True # bool --- If True, write solved WCS back into the FITS header on disk.
    solve_field_exe_loc: solve-field # str --- `solve-field` executable name/path (defaults to `solve-field` on PATH).
    solve_field_tweak_order: 4 # int --- solve-field SIP tweak order to use (single-value mode).
    prefer_scamp_tpv_after_solve: True # bool --- After solve-field succeeds, prefer SCAMP WCS (TPV/PV distortion) when available.
    # If True, preserve input non-linear distortion keywords (PV/SIP) when
    # merging solve-field WCS. Set False to fully replace distortion terms.
    # For fit_wcs_from_points-based refinement (below), this is ignored and
    # old distortion is NOT preserved.
    preserve_distortion_on_redo: False # bool --- If True, attempt to preserve existing non-linear distortion keywords (PV/SIP) when redoing WCS.
    compare_input_vs_solved_wcs: True # bool --- Log input-vs-solved WCS quality/parameter deltas on solve-field matched stars.
    keep_input_wcs_if_solved_not_better: True # bool --- If solve-field WCS is not better than input on matched points, keep original full input WCS for this frame.
    trust_input_distortion_model: False # bool --- If True, keep input distortion model (PV/SIP) and solve only linear WCS terms.
    fit_wcs_from_points_max_points: 1000 # int --- Max matched points to use.
    fit_wcs_from_points_min_points: 30 # int --- Minimum matched points required to attempt refit.
    fit_wcs_from_points_max_match_lines: 20000 # int --- Max lines to scan.
    fit_wcs_from_points_max_sep_arcsec: 3.0 # float --- Column validation threshold.
    fit_wcs_from_points_clip_sigma: 3.5 # float --- Robust sigma clip on initial-WCS residuals before SIP refit.
    fit_wcs_from_points_prefilter_min_keep_frac: 0.55 # float --- If strict prefilter keeps fewer than this fraction, retry with relaxed thresholds.
    fit_wcs_from_points_prefilter_relax_factor: 2.0 # float --- Multiplicative relaxation factor for max_sep_arcsec and clip_sigma in fallback prefilter.
    fit_wcs_from_points_accept_only_if_improves: True # bool --- Accept refined WCS only when residual metrics improve.
    fit_wcs_from_points_allow_degraded_accept: False # bool --- Keep False for science runs; True forces acceptance even when refinement catastrophically worsens residuals.
    fit_wcs_from_points_min_improvement_frac: 0.05 # float --- Require >=5% median residual improvement to accept refit.
    fit_wcs_from_points_min_improvement_arcsec: 0.05 # float --- Also require >=0.05 arcsec absolute median improvement.
    # If True, pass astrometry.net --crpix-center (CRPIX at image center). Omitting it often matches
    # telescope/subarray headers better and can improve photometry vs a forced-center solved WCS.
    solve_field_crpix_center: False # bool --- If True, pass astrometry.net `--crpix-center` (forces CRPIX at image center).
    refine_after_solve: False # bool --- If True, run an additional WCS refinement pass after a successful solve.
    # Final small linear correction after solve-field/SCAMP, estimated from matched stars.
    # This only nudges CRPIX and is applied only when the residual improvement is measurable.
    post_scamp_linear_refine: True # bool --- Enable post-solve CRPIX micro-alignment.
    post_scamp_linear_refine_min_points: 30 # int --- Minimum matched stars required for the micro-alignment estimate.
    post_scamp_linear_refine_max_shift_px: 2.0 # float --- Maximum allowed CRPIX nudge magnitude in pixels.
    post_scamp_linear_refine_min_improve_px: 0.03 # float --- Require at least this absolute median residual improvement (pixels).
    post_scamp_linear_refine_min_improve_frac: 0.02 # float --- Also require this fractional improvement (e.g. 0.02 = 2%).

    scamp_exe_loc: null # str|null --- Optional explicit path to `scamp` executable.
    sextractor_exe_loc: null # str|null --- Optional explicit path to SExtractor executable.
    scamp_astref_catalog: GAIA-DR3 # str --- Reference catalog name for SCAMP (if used).
    scamp_ref_timeout: 60 # int --- Vizier connection timeout (s) for SCAMP REF_TIMEOUT (built-in default 10 is often too low).
    scamp_ref_server: vizier.cfa.harvard.edu # str --- SCAMP REF_SERVER (Vizier mirror). Override if needed (e.g. vizier.unistra.fr, vizier.ast.cam.ac.uk).
    scamp_single_call: True # bool --- If True (default), run SCAMP only once per image (disables multi-trial optimization).
    scamp_optimize_after_solve: False # bool --- (Advanced) If True, try multiple SCAMP parameter trials after solve-field.
    scamp_optimize_max_trials: 1 # int --- Maximum SCAMP optimization trials to evaluate (1=base only).
    scamp_distort_degrees: 4 # int --- SCAMP distortion polynomial degree (higher can model stronger optical distortion; default 4).
    scamp_nthreads: 4 # int --- Number of SCAMP threads (within one SCAMP run).
    sextractor_nthreads: 4 # int --- SExtractor NTHREADS when run via run_sex wrapper.
    scamp_crossid_radius: 2.5 # float --- Cross-identification radius (arcsec) for SCAMP matching.
    scamp_position_maxerr: 1.0 # float --- Maximum positional error (arcsec) accepted by SCAMP.
    scamp_fwhm_thresholds: "1.0,15.0" # str --- SCAMP FWHM acceptance range (pixels), "min,max".
    scamp_astref_weight: 1 # int --- Weight applied to astrometric reference catalog.
    scamp_astrefmag_key: MAG_AUTO # str --- Magnitude column name used for astrometric reference weighting.
    scamp_astrefmagerr_key: MAGERR_AUTO # str --- Magnitude-error column name for astrometric reference weighting.
    scamp_astrefcent_keys: XWIN_WORLD,YWIN_WORLD # str --- World-coordinate centroid columns used by SCAMP.
    scamp_astreferr_keys: ERRA_WORLD,ERRB_WORLD,ERRTHETA_WORLD # str --- World-coordinate centroid error columns used by SCAMP.
    scamp_distort_keys: XWIN_IMAGE,YWIN_IMAGE # str --- Image-coordinate columns used by SCAMP distortion fit.
    scamp_mosaic_type: UNCHANGED # str --- SCAMP mosaic handling mode.
    scamp_stability_type: EXPOSURE # str --- SCAMP stability model type.
    scamp_sn_thresholds: "5.0,100000.0" # str --- SCAMP S/N thresholds, "min,max".

    search_radius: 0.5 # float --- Search radius (degrees) for blind/assisted WCS solving.
    downsample: 4 # int --- Downsampling factor used for source detection/solving speed-up.
    code_tolerance: 0.01 # float --- Tolerance for WCS solution acceptance (backend-dependent).
    objs: 1200 # int|null --- Optional target number of objects to use in solve-field.

    sextractor_detect_thresh: 1.5 # float --- SExtractor DETECT_THRESH for WCS source detection.
    sextractor_detect_minarea: 5 # int --- SExtractor DETECT_MINAREA for WCS source detection.
    sextractor_detect_maxarea: 0 # int --- SExtractor DETECT_MAXAREA for WCS source detection (0 disables max-area cut).
    sextractor_analysis_thresh: 1.2 # float --- SExtractor ANALYSIS_THRESH for WCS source detection.
    sextractor_deblend_nthresh: 32 # int --- SExtractor DEBLEND_NTHRESH for WCS source detection.
    sextractor_deblend_mincont: 0.005 # float --- SExtractor DEBLEND_MINCONT for WCS source detection.
    sextractor_back_type: AUTO # str --- SExtractor BACK_TYPE for WCS source detection.
    sextractor_back_value: 0.0 # float --- SExtractor BACK_VALUE for WCS source detection.
    sextractor_back_size: 64 # int --- SExtractor BACK_SIZE for WCS source detection.
    sextractor_back_filtersize: 3 # int --- SExtractor BACK_FILTERSIZE for WCS source detection.
    sextractor_backphoto_type: LOCAL # str --- SExtractor BACKPHOTO_TYPE for WCS source detection.
    sextractor_backphoto_thick: 24 # int --- SExtractor BACKPHOTO_THICK for WCS source detection.
    sextractor_back_filtthresh: 0.0 # float --- SExtractor BACK_FILTTHRESH for WCS source detection.
    sextractor_phot_apertures: null # float|null --- Optional SExtractor PHOT_APERTURES override for WCS source detection; null uses 1.7*kernel FWHM.

    crowded:
      objs: 800 # int --- Target number of objects in crowded-field solving mode.
      sextractor_detect_thresh: 2.5 # float --- Crowded-field SExtractor DETECT_THRESH.
      sextractor_detect_minarea: 8 # int --- Crowded-field SExtractor DETECT_MINAREA.
      sextractor_analysis_thresh: 2.0 # float --- Crowded-field SExtractor ANALYSIS_THRESH.
      sextractor_deblend_nthresh: 64 # int --- Crowded-field SExtractor DEBLEND_NTHRESH.
      sextractor_deblend_mincont: 0.001 # float --- Crowded-field SExtractor DEBLEND_MINCONT.
      cpulimit: 90 # int --- CPU time limit (seconds) for crowded-field solve attempts.
      search_radius: 0.5 # float --- Search radius (degrees) for crowded-field solving.

    crpix_offset: 0.0 # float --- Pixel offset applied to CRPIX when writing WCS (instrument-specific workaround).
    cpulimit: 45 # int --- CPU time limit (seconds) for solve attempts.

    TNS_BOT_ID: null # str|null --- Optional TNS bot ID (if querying TNS).
    TNS_BOT_NAME: null # str|null --- Optional TNS bot name (if querying TNS).
    TNS_BOT_API: null # str|null --- Optional TNS API key/token (if querying TNS).

  catalog:
    use_catalog: null # str|dict|null --- Catalog backend for calibration (e.g. `"refcat"`) or per-filter mapping (e.g. `{"ugriz":"sdss","UBVRI":"apass","default":"gaia"}`). Special value: `"gaia_custom"` builds a Gaia curve-map custom catalog from `catalog.transmission_curve_map` and routes to `custom`.
    catalog_custom_fpath: null # str|null --- Optional path to a user-supplied catalog file.
    transmission_curve_map: null # dict[str,str]|null --- Optional band->throughput file map for Gaia curve-map custom catalog builds. Example: `{"g":"curves/g.dat","r":"curves/r.dat","i":"curves/i.dat"}`.
    curve_map_svo: null # dict[str,str]|null --- Optional band->SVO filter-ID map to fetch curves. Example: `{"g":"SDSS/SDSS.g","r":"SDSS/SDSS.r","i":"SDSS/SDSS.i"}`.
    catalog_radius: 0.25 # float --- Search radius (degrees) around target for catalog query.
    gaia_xp_radius_deg: 0.1667 # float --- Search radius (degrees) for Gaia XP query (if used).
    gaia_xp_max_sources: 5000 # int --- Max Gaia sources for XP spectra/synthetic photometry (speed vs completeness).
    gaia_xp_order_by: brightness # str --- `brightness` (SQL order) or `distance` (prefetch + Python sort by on-sky sep; Gaia ADQL has no ORDER BY distance).
    gaia_xp_show_progress: False # bool --- tqdm progress for GaiaXPy batched calibrate/generate.
    # Transmission-curve custom catalog (catalog.transmission_curve_map) uses these if set; else falls back to gaia_xp_max_sources / order.
    gaia_curve_map_max_sources: 100 # int --- Max sources for curve-map Gaia CSV (nearest stars by default).
    gaia_curve_map_order_by: distance # str --- `distance` (Python sort after prefetch) or `brightness` (SQL order only).
    # When order is distance: Gaia ADQL cannot ORDER BY sky distance; we request TOP N (prefetch) then sort in Python.
    gaia_nearest_prefetch_factor: 50 # int --- SQL TOP >= max_sources * factor (capped below) before distance sort.
    gaia_nearest_prefetch_min: 200 # int --- Minimum prefetch TOP when using distance ordering.
    gaia_nearest_prefetch_max: 10000 # int --- Maximum prefetch TOP (archive load vs completeness tradeoff).
    # Gaia archive / GaiaXPy pacing (ESA recommends spacing heavy queries, e.g. 1 s).
    gaia_archive_query_pause_before_sec: 1.0 # float --- Sleep before each Gaia ADQL job (seconds).
    gaia_archive_query_pause_after_sec: 1.0 # float --- Sleep after each Gaia ADQL job (seconds).
    gaia_xp_batch_size: 200 # int --- Sources per GaiaXPy calibrate/generate call; use <=0 for one call (heavy).
    gaia_xp_batch_pause_sec: 1.0 # float --- Sleep between GaiaXPy batches (seconds).
    gaia_archive_max_retries: 3 # int --- Retries per ADQL batch / GaiaXPy batch on failure.
    gaia_archive_retry_base_delay_sec: 2.0 # float --- Initial backoff (seconds); doubles each retry.
    gaia_xp_generate_error_correction: True # bool --- If True, ask GaiaXPy `generate()` to apply empirical flux-error corrections (see Montegriffo+ 2022; GaiaXPy generator tutorial).
    gaia_xp_generate_truncation: False # bool --- If True, enable GaiaXPy `generate(..., truncation=True)` (GaiaXPy >= 2.1.4) to reduce high-order basis noise for faint sources.
    gaia_xp_photometric_systems: ["SDSS_Std", "JKC_Std"] # list[str]|null --- Which GaiaXPy photometric systems to generate.
      # Set to null or [] to disable XP synthetic photometry and fall back to base DR3 photometry only.
    include_IR_sequence_data: False # bool --- If True, augment catalog with IR sequence data (when available).
    MASTcasjobs_wsid: null # str|null --- Optional MAST CasJobs workspace ID for refcat/casjobs-backed catalog queries.
    MASTcasjobs_pwd: null # str|null --- Optional MAST CasJobs password/token for refcat/casjobs-backed catalog queries.

  cosmic_rays:
    remove_cmrays: False # bool --- Enable cosmic-ray removal in preprocessing.
    use_lacosmic: False # bool --- Use L.A.Cosmic-style algorithm (if available/configured).

  fitting:
    bkg_level: 3 # int --- Background handling mode/level (pipeline-specific; higher typically more aggressive).

  source_detection:
    # Also multiplies measured FWHM to set runtime ``scale`` (PSF cutouts, limits, plots). Legacy code ignored this key and used 4.0.
    scale_multipler: 3 # float --- FWHM->scale factor (see utils/run_sex.scale_multiplier_from_config).
    scale_min_px: 11 # int --- Minimum allowed runtime `scale` (pixels) after FWHM-based scaling/clamping.
    scale_max_px: 300 # int --- Maximum allowed runtime `scale` (pixels) after FWHM-based scaling/clamping.
    use_catalog: null # str|null --- Optional catalog to seed/guide source detection (if supported).

  limiting_magnitude:
    beta_limit: 0.5 # float --- Beta threshold used to declare an injected source recovered (primary criterion; higher is more conservative).
    detection_limit: null # float|null --- Optional S/N detection threshold. If set, a trial counts as recovered only if (S/N >= detection_limit) AND (beta >= beta_limit). If null, recovery is beta-only.
    completeness_target: 0.5 # float --- Target recovery fraction at the limiting magnitude (Harris 1990 completeness definition; 0.5 = 50% completeness).
    recovery_method: auto # str --- "auto" matches the transient: aperture-only -> AP, PSF path -> PSF. Or set explicitly: PSF, AP, EMCEE/MCMC.
    completeness_solver: bisect # str --- How to solve for the limiting magnitude at completeness_target: "bisect" (default; bracket+bisection on recovery fraction) or "logistic_emcee" (fit a smooth logistic completeness curve with emcee and take m50).
    logistic_emcee_nmags: 9 # int --- For completeness_solver=logistic_emcee: number of magnitudes to sample around the transition.
    logistic_emcee_span_mag: 1.5 # float --- For completeness_solver=logistic_emcee: half-span (mag) around the initial m50 guess to sample.
    logistic_emcee_nwalkers: 32 # int --- For completeness_solver=logistic_emcee: emcee walkers for the logistic fit.
    logistic_emcee_nsteps: 2000 # int --- For completeness_solver=logistic_emcee: emcee steps for the logistic fit.
    logistic_emcee_burnin_frac: 0.3 # float --- For completeness_solver=logistic_emcee: burn-in fraction for the logistic fit.
    logistic_emcee_save_plot: True # bool --- Deprecated (ignored): logistic_emcee always saves a diagnostic plot.
    emcee_save_diagnostic_plot: True # bool --- If True and recovery_method is EMCEE/MCMC, save a small emcee diagnostic plot for one representative injected trial near the final limiting magnitude.
    initial_guess: null # float|null --- Initial instrumental-magnitude seed for injected-limit search. Null enables automatic annulus-based estimation around the target.
    inject_source_location: 3 # int --- Injection position strategy for limiting-mag trials (pipeline-specific).
    injection_strategy: ring_quiet # str --- Local-only injection placement near transient: "ring_quiet" (default; fixed-radius ring), or "annulus_random" (random points inside [inject_min_radius_fwhm, inject_max_radius_fwhm]).
    inject_min_radius_fwhm: 2.0 # float --- Minimum injection radius from the transient (in FWHM units). Prevents injecting on top of the transient.
    inject_max_radius_fwhm: 6.0 # float --- Maximum injection radius from the transient (in FWHM units) when searching for quiet injection sites.
    inject_use_quiet_sites: true # bool --- If true, select only "quiet" sites (below detection threshold) for injection. If false, use all injection sites regardless of detection probability, which provides more representative limiting magnitude for the target location.
    initial_guess_n_samples: 24 # int --- Number of annulus probe positions used to estimate the injected-limit initial instrumental magnitude.
    initial_guess_mag_percentile: 75.0 # float --- Faint-side percentile of annulus instrumental magnitudes used for injected-limit initial guess.
    initial_guess_sigma_mult: 5.0 # float --- Initial injected-limit guess uses flux ~= (this * sigma_sky * sqrt(Npix)) from annulus probe measurements; converted to instrumental magnitude.
    scale_growth_factor: 1.5 # float --- If no quiet injection sites are found, multiply runtime `scale` by this factor and retry (up to scale_growth_max_px).
    scale_growth_max_px: 600 # int --- Maximum runtime `scale` (pixels) allowed during limiting-magnitude quiet-site retries.
    injection_n_sites: 10 # int --- Number of candidate injection sites around the target used for injection/recovery trials (more = smoother completeness curve; slower).
    injection_jitter_repetitions: 5 # int --- Sub-pixel jitter repetitions per site per magnitude (more = smoother completeness curve; slower).
    completeness_plot_span_mag: 0.8 # float --- Half-span (mag) around the adopted limit used for the completeness plot sampling range (smaller = fewer bins far from transition).
    completeness_plot_nmags: 9 # int --- Number of magnitudes sampled across completeness_plot_span_mag for the completeness bar chart.
    plot_injection_recovery: false # bool --- If true, generate the InjectionRecovery plot showing injected vs recovered magnitudes. If false, skip this plot.
    n_jobs: 1 # int --- Worker processes for injection/recovery and background-limit trials (per-image). 1 = serial; >1 can speed up Monte Carlo trials.

  alignment:
    reproject_method: adaptive # str --- Reprojection strategy/method selector for WCS alignment (pipeline-specific).
    reproject_roundtrip_coords: True # bool --- Coordinate round-trip check (matches reproject default; False can mis-register).
    reproject_interp_order: bicubic # str|int --- Interpolation order/mode for reprojection (e.g. nearest, bilinear, bicubic).
    reproject_parallel: False # bool --- Enable parallel reprojection where supported (faster on large mosaics if CPU-bound; set True when memory allows).
    # reproject_adaptive only: library default is False; True rescales pixels for flux conservation (can blur when scales match).
    reproject_adaptive_conserve_flux: False # bool --- Adaptive reprojection: conserve flux by rescaling pixels (can blur slightly when scales match).
    reproject_adaptive_center_jacobian: False # bool --- More accurate Jacobian at grid points; slower (non-smooth WCS).
    reproject_subpixel_refine: False # bool --- If True, apply subpixel refinement after WCS alignment (where implemented).
    reproject_max_rms_pixels: 0.90 # float --- Maximum acceptable reproject alignment score (median mutual-pair residual, pixels) before fallback.
    plot_source_check_distortion_vectors: True # bool --- Overlay catalog->detected residual vectors on Sourcecheck plot.
    plot_source_check_distortion_grid_map: False # bool --- Overlay gridded distortion-magnitude heatmap (pixels) on Sourcecheck plot.
    plot_source_check_distortion_grid_colorbar: True # bool --- Show colorbar for distortion grid-map magnitude overlay.
    plot_source_check_distortion_grid_alpha: 0.35 # float --- Opacity of distortion grid-map overlay.
    plot_source_check_distortion_grid_cmap: viridis # str --- Matplotlib colormap name for distortion grid-map overlay.
    plot_source_check_max_sep_pix: 6.0 # float --- Max nearest-neighbor separation (pixels) for residual-vector pairing.
    plot_source_check_max_vectors: 300 # int --- Max vectors to draw on Sourcecheck plot (for readability).
    plot_source_check_min_vectors: 10 # int --- Minimum matched vectors required before drawing overlay.

  template_subtraction:
    do_subtraction: False # bool --- Enable template subtraction step.
    alignment_method: swarp # str --- Science-template registration method (reproject, swarp, astroalign).
    alignment_use_extended_sources: False # bool --- If True, allow large/extended sources (galaxies) in SCAMP matching catalogs.
    alignment_max_fwhm_pix: 50.0 # float --- Max FWHM (pixels) kept when alignment_use_extended_sources=False.
    method: sfft # str --- Subtraction backend (sfft default; hotpants or zogy optional where available).
    kernel_order: 0 # int --- Polynomial order for the SFFT kernel flux scaling model.
    download_templates: False # bool|str --- If set, download templates into `fits_dir/templates/` before subtraction. Use one of: "panstarrs", "legacy", "sdss" (or False to disable).
    templates_size: 10 # float --- Template cutout size (arcmin) around target when building/using templates.

    hotpants_exe_loc: hotpants # str --- HOTPANTS executable name/path (defaults to `hotpants` on PATH).
    hotpants_timeout: 100 # int --- Timeout (seconds) for HOTPANTS subtraction call.

    scale_template_to_science: True # bool --- If True, scale template to better match science image photometric level before subtraction.
    subtraction_max_masked_fraction: 0.90 # float --- Abort subtraction if masked fraction exceeds this value.
    image_shape: null # list[int]|null --- Optional expected image shape (ny, nx) for validation; null disables check.
    use_catalog_for_matching: True # bool --- If True, use catalog sources (when available) for matching/registration heuristics.

    sfft_crowded_auto: False # bool --- Auto-enable SFFT crowded-field tuning based on source density heuristics.
    sfft_crowded_min_sources: 500 # int --- Crowded-field trigger: minimum number of detected sources for SFFT tuning.
    sfft_crowded_min_density: 100 # float --- Crowded-field trigger: minimum sources per area (pipeline-specific units).
    sfft_bg_order: 0 # int --- SFFT background spatial polynomial order (0=constant). Input images are assumed background-subtracted.
    sfft_back_size: 128 # int --- SExtractor BACK_SIZE used by SFFT source selection/background estimation.
    sfft_back_filtersize: 6 # int --- SExtractor BACK_FILTERSIZE used by SFFT background smoothing.
    sfft_backphototype: LOCAL # str --- SExtractor BACKPHOTO_TYPE for source photometry background: LOCAL or GLOBAL.

    crowded_field: False # bool --- Global crowded-field flag for subtraction/source selection heuristics.
    sextractor_crowded: False # bool --- Use crowded-field SExtractor settings for subtraction/source selection (if supported).
    sfft_crowded_method: False # bool --- Force SFFT crowded-field configuration (overrides auto logic).
    sfft_const_phot_ratio: True # bool --- SFFT ConstPhotRatio; True enforces one global flux scale across the frame.
    sfft_only_flags: [0, 1, 2] # list[int]|null --- SExtractor FLAGS values kept by SFFT source selection (null disables flag filtering).
    sfft_allow_crowded_bg_order_override: False # bool --- If True, crowded SFFT may override bg_order=0 to 2 for stability.
    sfft_cvrej_magd_thresh: 0.12 # float --- Coarse variable-rejection magnitude-difference threshold (lower is stricter).
    sfft_evrej_ratio_thresh: 6.0 # float --- Elaborate variable-rejection ratio threshold (lower is stricter).
    sfft_evrej_safe_magdev: 0.04 # float --- Safe magnitude-deviation threshold for elaborate rejection.
    sfft_pac_ratio_thresh: 2.8 # float --- Post-anomaly-check ratio threshold for SFFT source filtering.
    sfft_use_post_anomaly_feedback: True # bool --- If True, run one extra SFFT pass using MeLOn post-anomaly sources as additional banned priors.
    sfft_post_anomaly_min_count: 1 # int --- Minimum number of post-anomaly sources required before feedback retry is triggered.
    sfft_post_anomaly_max_fraction: 0.80 # float --- Skip feedback retry if post-anomaly count exceeds this fraction of prior-selected sources.
    sfft_post_anomaly_match_radius_px: 1.5 # float --- Radius (pixels) for removing prior-selected matches near post-anomaly sources on retry.

    inpaint_template_cores: False # bool --- Inpaint saturated template star cores before subtraction (helps when template has broken cores).
    inpaint_method: biharmonic # str --- Inpainting algorithm name (e.g. biharmonic).
    inpaint_saturate_frac: 0.90 # float --- Saturation threshold as fraction of max/bit-depth for core mask creation.
    inpaint_dilate_radius: 6 # int --- Mask dilation radius (pixels) around saturated cores before inpainting.
    inpaint_max_mask_fraction: 0.01 # float --- Safety limit: skip inpainting if mask covers more than this fraction of the image.

  background:
    crowded_bright_frac_min: 0.40 # float --- Crowded-field trigger based on bright-source fraction (pipeline-specific metric).
    # SPEED OPTIMIZATION: Set fast_mode: True to significantly reduce background estimation time.
    # When enabled: skips FFT-based FWHM estimation (uses default), uses larger mesh boxes,
    # skips expensive mask edge flattening, reduces sigma-clip iterations, skips full-image
    # satellite-trail detection by default, and tightens local cutout mask/sigma-clip work.
    # Trade-off: slightly less accurate background in complex fields, but usually adequate.
    fast_mode: False # bool --- If True, use faster/less robust background estimation settings.
    # When fast_mode is True: skip _make_satellite_trail_mask (connected-component pass on the full image). Set false to keep trail masking at higher CPU cost.
    fast_mode_skip_trail_mask: True # bool --- Only used if fast_mode is True; set false to run trail detection anyway.
    mesh_scale_min: 4.0 # float --- Minimum background mesh scale (in FWHM units unless otherwise specified).
    mesh_scale_max: 10.0 # float --- Maximum background mesh scale (in FWHM units unless otherwise specified).
    mesh_filter_size_mesh_units: 3 # int --- Background smoothing filter size expressed in mesh-cell units.
    global_interpolator: zoom # str --- Background2D interpolator ("zoom" fast; "idw" slower, can help pathological gradients).
    global_interp_order: 3 # int --- Order for zoom interpolator (0 nearest, 1 linear, 3 cubic).
    global_sigma_clip_maxiters: 6 # int --- SigmaClip max iterations per mesh cell (lower = faster; use 10+ if noisy).
    # NOTE: global_mask_edge_flatten is automatically disabled when fast_mode=True unless explicitly set to True.
    global_mask_edge_flatten: True # bool --- If True, damp Background2D interpolation overshoot near masked regions by replacing a thin band around mask edges with a smooth estimate from nearby unmasked pixels.
    global_mask_edge_flatten_radius_px: null # float|null --- Flatten band radius (pixels). If null, defaults to max(2, ~1*FWHM).
    global_mask_edge_flatten_sigma_px: null # float|null --- Gaussian smoothing sigma (pixels) for mask-edge flattening. If null, defaults to radius/2.
    source_mask_convolve: False # bool --- If True, Gaussian-smooth before detection (slower; can reduce mask fragmentation).
    source_mask_convolve_first_iter_only: True # bool --- If source_mask_convolve=True, smooth only on iteration 0 (faster).
    source_mask_iterative_bkg_update: False # bool --- If True, update residual between mask iterations using a quick coarse Background2D fit.

    local_mesh_scale: 0.8 # float --- Background2D box-size scale factor relative to FWHM (local background).
    local_min_box: 6 # int --- Minimum Background2D box size (pixels).
    local_region_fraction_limit: 0.15 # float --- Max fraction of image covered by local region before falling back (pipeline-specific).
    local_box_size: null # int|null --- Optional explicit local background box size (pixels). If null, use adaptive sizing.
    local_filter_size: null # int|null --- Optional explicit local Background2D filter size (pixels). If null, use computed value (capped by local_filter_size_max).
    local_filter_size_max: 3 # int --- Maximum allowed filter size when adaptively increasing filter size.
    local_interpolator: zoom # str --- Background2D interpolator method (e.g. zoom).
    local_interp_order: 1 # int --- Interpolator order (e.g. 0 nearest, 1 linear).
    local_source_mask_nsigma: 5.0 # float --- Sigma threshold for masking sources during local background estimation.
    local_source_mask_npixels: 7 # int --- Minimum connected pixels for source mask creation.
    local_source_mask_iterations: 2 # int --- Number of mask/estimate iterations for local background.
    local_exclude_percentile: 95.0 # float --- Percentile threshold to exclude brightest pixels from background fit.
    local_sigma_clip: 3.0 # float --- Sigma clipping threshold for background statistics.
    local_sigma_clip_maxiters: 10 # int --- Maximum sigma-clipping iterations.
    local_nonnegative_target_offset: True # bool --- If True, after local subtraction in the cutout, add a uniform constant to the residual (and subtract the same from the returned local surface) so a chosen cutout statistic meets a floor (see local_cutout_floor_stat/local_cutout_min_value). This is a robustness hack for difference images. The pipeline removes this constant again for AP/PSF/limiting-magnitude measurements to avoid biasing fluxes.
    local_cutout_floor_stat: median # str --- Which statistic to floor in the locally subtracted cutout: "median" (recommended; allows some negatives) or "min" (forces all finite pixels >= floor; stronger bias).
    local_cutout_min_value: 0.0 # float --- Floor value for the chosen statistic in the locally subtracted cutout. Use 0.0 for nonnegative median; small positive if you truly require >0.
    local_cutout_annulus_sigma_mult: 2.0 # float --- Additional requirement: raise the local cutout floor so the background-like median is >= (this * annulus_std), where annulus_std is sigma-clipped std in an annulus around the target on the locally subtracted cutout.
    local_cutout_annulus_in_scale_fwhm: 3.0 # float --- Inner radius for the annulus_std estimate, in units of FWHM (pixels). The effective inner radius is max(exclude_inner_radius, this*FWHM).
    local_cutout_annulus_width_scale_fwhm: 2.0 # float --- Width of the annulus used for annulus_std estimate, in units of FWHM (pixels).

  zeropoint:
    min_source_no: 3 # int --- Minimum number of sources required for color-term fitting.
    reject_nonlinear_sources: True # bool --- If True, reject likely saturated/non-linear zeropoint stars using peak_flux vs saturate.
    nonlinear_peak_frac: 0.85 # float --- Reject zeropoint stars when peak_flux >= nonlinear_peak_frac * saturate.
    saturation_peak_frac: 0.99 # float --- Log subset considered saturated when peak_flux >= saturation_peak_frac * saturate.
